name: Deploy Lambda to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      LAMBDA_FUNCTION_NAME: zoey

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verification tooling
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run preflight checks
        shell: bash
        run: |
          set -euo pipefail
          python scripts/preflight.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${AWS_REGION}" || { echo "Missing secret: AWS_REGION"; exit 1; }

      - name: Package Lambda
        shell: bash
        run: |
          set -euo pipefail
          zip -r function.zip lambda_function.py zoey -x "*/__pycache__/*" "*.pyc"

      - name: Deploy Lambda code
        shell: bash
        run: |
          set -euo pipefail
          aws lambda update-function-code \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --zip-file fileb://function.zip

      - name: Wait for update completion
        shell: bash
        run: |
          set -euo pipefail
          aws lambda wait function-updated \
            --function-name "${LAMBDA_FUNCTION_NAME}"

      - name: Deployment summary
        shell: bash
        run: |
          aws lambda get-function \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --query 'Configuration.[FunctionName,LastModified,Version]' \
            --output table
